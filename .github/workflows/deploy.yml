name: Deploy to GitHub Pages

# Deploy on every push to main, or manually from the Actions tab.
on:
    push:
        branches: [main]
    workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish Pages.
permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Configure Pages
              uses: actions/configure-pages@v6

            # Static site — no build step. Upload the repo root as-is.
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: "."

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
